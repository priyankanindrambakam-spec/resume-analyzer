<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analysis Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: sans-serif; padding-top: 50px; }
        .job-card { border-radius: 15px; margin-bottom: 20px; transition: 0.3s; }
        .job-card:hover { transform: translateY(-5px); }
        .score-badge { font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2 class="text-center mb-5 fw-bold text-primary text-uppercase">AI Career Compatibility Report</h2>
    
    <div class="row">
        {% for res in results %}
        <div class="col-md-6">
            <div class="card job-card shadow-sm border-0">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="fw-bold mb-0 text-dark">{{ res.role }}</h4>
                        <span class="badge rounded-pill {% if res.score > 70 %}bg-success{% elif res.score > 40 %}bg-warning{% else %}bg-danger{% endif %} score-badge">
                            {{ res.score }}%
                        </span>
                    </div>
                    
                    <p class="mb-1 text-muted small uppercase fw-bold">Matched Skills:</p>
                    <div class="mb-3">
                        {% for s in res.matched %}
                        <span class="badge bg-light text-success border border-success me-1">{{ s }}</span>
                        {% endfor %}
                    </div>

                    <p class="mb-1 text-muted small uppercase fw-bold text-danger">Gaps found:</p>
                    <div>
                        {% for s in res.missing %}
                        <span class="badge bg-light text-danger border border-danger me-1">{{ s }}</span>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    <div class="text-center mt-5 mb-5">
        <a href="/" class="btn btn-outline-primary px-5 rounded-pill">Analyze Another Resume</a>
    </div>
</div>
</body>
</html>

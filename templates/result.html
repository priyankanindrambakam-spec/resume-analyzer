<div class="text-center mt-5 mb-5">
    <a href="/" class="btn btn-outline-primary px-5 rounded-pill">Analyze Another Resume</a>
    
    <button onclick="downloadPDF()" class="btn btn-success px-5 rounded-pill ms-2 shadow-sm">
        Download Report (PDF) 📥
    </button>
</div>

<script>
function downloadPDF() {
    // Flask nundi vachina results ni JavaScript loki teesukuntunnam
    const results = {{ results | tojson }};
    
    // Backend '/download_report' route ki data pampisthunnam
    fetch('/download_report', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({results: results})
    })
    .then(response => {
        if (response.ok) return response.blob();
        throw new Error('Download failed');
    })
    .then(blob => {
        // PDF ni browser lo download cheyisthunnam
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Resume_Analysis_Report.pdf';
        document.body.appendChild(a);
        a.click();
        a.remove();
    })
    .catch(error => alert("Error: " + error.message));
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .job-card { border: none; border-radius: 15px; transition: 0.3s; height: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .job-card:hover { transform: translateY(-5px); }
        .score-badge { font-size: 1.2rem; padding: 10px 20px; border-radius: 50px; color: white; font-weight: bold; }
        .skill-tag { border-radius: 20px; padding: 5px 12px; font-size: 0.85rem; display: inline-block; margin: 3px; border: 1px solid #ddd; }
        .matched { background-color: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
        .missing { background-color: #ffebee; color: #c62828; border-color: #ffcdd2; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h2 class="text-center mb-5 text-primary fw-bold">AI CAREER COMPATIBILITY REPORT</h2>
        
        <div class="row g-4">
            {% for res in results %}
            <div class="col-md-6">
                <div class="card job-card p-4">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <h4 class="fw-bold text-dark m-0">{{ res.role }}</h4>
                        <span class="score-badge {% if res.score >= 70 %}bg-success{% elif res.score >= 40 %}bg-warning{% else %}bg-danger{% endif %}">
                            {{ res.score }}%
                        </span>
                    </div>
                    
                    <div class="mb-3">
                        <p class="text-muted fw-bold mb-1">Matched Skills:</p>
                        {% for skill in res.matched %}
                        <span class="skill-tag matched">{{ skill }}</span>
                        {% endfor %}
                    </div>

                    <div>
                        <p class="text-muted fw-bold mb-1">Gaps found:</p>
                        {% for skill in res.missing %}
                        <span class="skill-tag missing">{{ skill }}</span>
                        {% endfor %}
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="text-center mt-5 mb-5">
            <a href="/" class="btn btn-outline-primary px-5 rounded-pill shadow-sm">Analyze Another Resume</a>
            <button onclick="downloadPDF()" class="btn btn-success px-5 rounded-pill ms-2 shadow-sm">Download Report (PDF) 📥</button>
        </div>
    </div>

    <script>
    function downloadPDF() {
        const results = {{ results | tojson }};
        fetch('/download_report', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({results: results})
        })
        .then(response => {
            if (response.ok) return response.blob();
            throw new Error('Download failed');
        })
        .then(blob => {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Resume_Analysis_Report.pdf';
            document.body.appendChild(a);
            a.click();
            a.remove();
        })
        .catch(error => alert("Error: " + error.message));
    }
    </script>
</body>
</html>

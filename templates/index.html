<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header-section {
            background: #2563eb;
            color: white;
            padding: 40px;
            text-align: center;
        }
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            background: #f8fafc;
        }
        .upload-area:hover {
            border-color: #2563eb;
            background: #eff6ff;
        }
        .btn-primary {
            background: #2563eb;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
        }
        #loading {
            display: none;
        }
        .spinner-border {
            width: 3rem;
            height: 3rem;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="header-section">
                    <h1 class="fw-bold">AI Resume Analyzer 🚀</h1>
                    <p class="mb-0 text-white-50">Get instant feedback and career gap analysis</p>
                </div>
                
                <div class="card-body p-5">
                    <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
                        <div class="upload-area mb-4" onclick="document.getElementById('resumeInput').click()">
                            <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png" width="60" alt="PDF Icon" class="mb-3">
                            <h5 class="fw-bold">Click to upload your Resume</h5>
                            <p class="text-muted">Only PDF files are supported</p>
                            <input type="file" name="resume" id="resumeInput" accept=".pdf" hidden required onchange="updateFileName()">
                            <p id="fileName" class="text-primary fw-bold mt-2"></p>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg" onclick="showLoading()">
                                Start AI Analysis
                            </button>
                        </div>
                    </form>

                    <!-- Loading Section -->
                    <div id="loading" class="text-center mt-4">
                        <div class="spinner-border text-primary mb-3" role="status"></div>
                        <h5 class="fw-bold">AI is scanning your skills...</h5>
                        <p class="text-muted small">This may take a few seconds</p>
                    </div>
                </div>
            </div>
            <p class="text-center mt-4 text-muted small">Built with Python & Flask • Industry Level Project</p>
        </div>
    </div>
</div>

<script>
    function updateFileName() {
        const input = document.getElementById('resumeInput');
        const fileName = document.getElementById('fileName');
        fileName.textContent = "Selected: " + input.files[0].name;
    }

    function showLoading() {
        const form = document.getElementById('uploadForm');
        if (document.getElementById('resumeInput').files.length > 0) {
            document.getElementById('loading').style.display = 'block';
            form.style.opacity = '0.3';
            form.style.pointerEvents = 'none';
        }
    }
</script>

</body>
</html>
